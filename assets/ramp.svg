<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" height="32" width="32">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="3" result="spread"/>
      <feFlood flood-color="white" flood-opacity="0.5"/>
